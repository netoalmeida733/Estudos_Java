<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="icon" href="imagens/phone_4639549.png">
<link rel="stylesheet" href="style.css">
<title>Agenda de Contatos</title>
</head>
<style>

#container {
    	display: flex;
   	align-items: center;
	padding: 5px;
}

#container input {
   	display: flex;
   	align-items: center;
    width: 300px;      /* largura da caixa */
    height: 40px;      /* altura da caixa */
    font-size: 16px;   /* tamanho do texto */
    padding: 8px;
    margin-bottom: 10px;
}
.btn {
    width: 320px;
    display: inline-block;
    padding: 6px 12px;
    margin: 2px;
    border-radius: 8px ;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;
    color: #fff;
    transition: 0.3s;
    background: linear-gradient(135deg, #1e90ff, #0047ff)
    
}
h1 {
    display: inline-block;
    margin: 20px auto;
    padding: 14px 28px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 1px;
    color: #fff;
    background: linear-gradient(135deg, #1e90ff, #00bfff);
    box-shadow: 0 8px 20px rgba(30, 144, 255, 0.35);
    text-transform: uppercase;
    position: relative;
}


</style>
<body>
	<h1>Criar Novo Contato</h1>
	<form name="frmContato" action="insert" method="post"> 
    <table id="container">
        <tr>
            <td><input   type="text" name="nome" placeholder="Nome" required></td>
        </tr>
        <tr>
            <td><input type="text" name="fone" placeholder="Fone" required></td>
        </tr>
        <tr>
            <td><input type="text" name="email" placeholder="Email" required></td>
        </tr>
    </table>
    <input class="btn" type="submit" value="Adicionar">
</form>

</body>
</html>
