<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<link rel="icon" href="imagens/phone_4639549.png">
<link rel="stylesheet" href="style.css">
<title>Agenda de Contatos</title>
</head>
<style>
.tabela {
	margin-top: 10px;
	border: 2px solid  #ddd;
	padding: 15px;
	background-color: skyblue;
	color: white;
	border-radius: 10px;
}
.btn {
    display: inline-block;
    padding: 6px 12px;
    margin: 2px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;
    color: #fff;
    transition: 0.3s;
    background: linear-gradient(135deg, #1e90ff, #0047ff)
}
h1 {
       display: block;          /* força quebrar linha */
    margin-bottom: 15px;     /* espaço abaixo do título */
    padding: 14px 28px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 1px;
    color: #fff;
    background: linear-gradient(135deg, #1e90ff, #00bfff);
    box-shadow: 0 8px 20px rgba(30, 144, 255, 0.35);
    text-transform: uppercase;
    position: relative;
   
}


</style>
<body>
	<img src="imagens/schedule_8798541.png">
	<h1>Agenda de Contatos</h1>
	<a href="main" class="btn">Acessar</a>
</body>
</html>
